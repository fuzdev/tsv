# Restriction lints (`unwrap_used` / `expect_used` / `panic`) are warn-level
# workspace-wide (see Cargo.toml `[workspace.lints.clippy]`) so production
# panic points need an explicit justified `#[allow]`. Tests panic on assertion
# failure by design, so allow the three there.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
