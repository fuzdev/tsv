# Checks the workspace: mirrors the local `deno task check` gate exactly
# (typecheck, cargo test + fixtures, deno tests, conformance audit,
# rustfmt --check, AST-type drift, clippy with -D warnings).
#
# Needs Rust *and* Deno: the fixture suite drives prettier + svelte through a
# Deno sidecar (npm: specifiers pinned in crates/tsv_debug/src/deno/sidecar.ts
# and locked in deno.lock), so `cargo test --workspace` panics without Deno —
# tests/fixtures_tests.rs health-checks the sidecar first. wasm-pack is not
# needed here (no WASM build in `check`).

name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# This job only reads the repo; deny everything else (least privilege).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    # The fixture suite fetches pinned npm packages at runtime (no frozen
    # lock), so bound the job to fail fast on a registry stall or hung sidecar
    # instead of running to the 6h default.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Pinned, not `stable`: the workspace runs clippy::nursery at warn and the
      # `lint` task denies warnings, so a floating toolchain would fail CI
      # whenever a new Rust release adds a nursery lint. Edition 2024 needs
      # >= 1.85. Bump deliberately.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags; bump manually)
        with:
          toolchain: 1.94.1
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Check
        run: deno task check
