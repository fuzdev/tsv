# Keeps the SHA-pinned actions in .github/workflows/ current: Dependabot opens
# PRs that bump each pin *and* rewrite its `# vX.Y.Z` comment, so pinning stays
# maintainable instead of silently rotting. (dtolnay/rust-toolchain is pinned to
# a branch SHA with no semver tags, so it can't be auto-bumped — update manually.)

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Batch action bumps into one PR instead of one-per-action.
    groups:
      actions:
        patterns: ['*']
